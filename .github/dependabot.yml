version: 2
updates:
  # All Python packages under agent-governance-python/, covered by a single
  # multi-directory entry. A separate per-directory entry for any of these
  # dirs would be a duplicate ecosystem+directory config and invalidate the
  # whole file, so they are intentionally consolidated here.
  #
  # The python-dev-tooling group (mypy, pytest, structlog, ruff) is grouped
  # across all directories: the docker-compose-test image installs every
  # package's [dev] extras into a single pip environment, so bumping one
  # package's dev-tool floor past another's cap makes the resolver unsolvable
  # (see issue #2930). Grouping lands those bumps as one PR. Every other
  # dependency still gets its own individual PR per directory.
  - package-ecosystem: "pip"
    directories:
      - "/agent-governance-python/agent-os"
      - "/agent-governance-python/agent-mesh"
      - "/agent-governance-python/agent-hypervisor"
      - "/agent-governance-python/agent-sre"
      - "/agent-governance-python/agent-compliance"
      - "/agent-governance-python/agent-discovery"
      - "/agent-governance-python/agent-lightning"
      - "/agent-governance-python/agent-marketplace"
      - "/agent-governance-python/agent-mcp-governance"
      - "/agent-governance-python/agent-primitives"
      - "/agent-governance-python/agent-rag-governance"
      - "/agent-governance-python/agent-runtime"
      - "/agent-governance-python/agent-sandbox"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      python-dev-tooling:
        patterns:
          - "mypy"
          - "pytest*"
          - "structlog"
          - "ruff"

  # npm packages
  - package-ecosystem: "npm"
    directory: "/agent-governance-python/agent-os/extensions/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/agent-governance-python/agent-os/extensions/copilot"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/agent-governance-copilot-cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/agent-governance-claude-code"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/agent-governance-typescript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/agent-governance-antigravity-cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # .NET
  - package-ecosystem: "nuget"
    directory: "/agent-governance-dotnet"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Rust
  - package-ecosystem: "cargo"
    directory: "/agent-governance-rust"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Go
  - package-ecosystem: "gomod"
    directory: "/agent-governance-golang"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Docker
  - package-ecosystem: "docker"
    directory: "/agent-governance-python/agent-os"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
